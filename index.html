<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Gold Apex AI — Terminal Pro V8.1</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--gold:#C9A84C;--gl:#E8C460;--gd:rgba(201,168,76,0.12);--gb:rgba(201,168,76,0.22);--bg:#080808;--bg2:#0E0E0E;--bg3:#141414;--tx:#DDD5C8;--mu:#555;--gr:#4CAF82;--rd:#E05555}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
.hdr{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid #1A1A1A;flex-shrink:0}
.hlogo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;background:linear-gradient(135deg,var(--gl),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hstatus{margin-left:auto;font-size:11px;color:var(--gr);font-family:'DM Mono',monospace;display:flex;align-items:center;gap:5px}
.hsd{width:7px;height:7px;border-radius:50%;background:var(--gr);animation:pl 2s infinite}
@keyframes pl{0%,100%{opacity:1}50%{opacity:0.3}}
.cap-bar{background:var(--bg2);padding:10px 16px;border-bottom:1px solid #111;display:flex;justify-content:space-between;font-size:11px;font-family:'DM Mono',monospace}
.stabs{display:flex;border-bottom:1px solid #111;flex-shrink:0;overflow-x:auto;background:var(--bg2)}
.stab{flex:1;padding:12px 5px;font-size:9px;color:var(--mu);cursor:pointer;border-bottom:2px solid transparent;font-family:'DM Mono',monospace;text-transform:uppercase;text-align:center}
.stab.on{color:var(--gl);border-bottom-color:var(--gold);background:var(--gd)}
.msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.msg{max-width:92%;padding:14px;border-radius:12px;font-size:13px;line-height:1.5}
.ai{background:var(--bg3);border-left:3px solid var(--gold);align-self:flex-start}
.user{background:var(--gd);color:var(--gl);align-self:flex-end}
.mode-toggle{display:flex;padding:10px 16px;gap:10px;background:var(--bg2);border-bottom:1px solid #111}
.mode-btn{flex:1;padding:8px;font-size:10px;border-radius:6px;border:1px solid #222;background:var(--bg3);color:var(--mu);cursor:pointer;text-align:center;font-family:'DM Mono'}
.mode-btn.on{border-color:var(--gold);color:var(--gl);background:var(--gd)}
.qas{display:flex;gap:8px;padding:10px;overflow-x:auto;border-top:1px solid #111}
.qa{flex-shrink:0;background:var(--bg3);border:1px solid #222;border-radius:20px;color:#888;font-size:10px;padding:6px 14px;cursor:pointer}
.in-area{padding:12px;background:var(--bg);display:flex;gap:10px;border-top:1px solid #111}
input{flex:1;background:var(--bg3);border:1px solid #222;color:white;padding:12px;border-radius:12px;outline:none}
.sbtn{background:var(--gd);border:1px solid var(--gb);width:45px;border-radius:12px;display:flex;align-items:center;justify-content:center;color:var(--gl)}
hr{border:0;border-top:1px solid rgba(201,168,76,0.2);margin:8px 0}
b{color:var(--gl)}
</style>
</head>
<body>

<div class="hdr">
    <div class="hlogo">GOLD APEX PRO</div>
    <div class="hstatus" id="price"><div class="hsd"></div> XAU/USD $---</div>
</div>

<div class="cap-bar">
    <div>SOLDE: <span id="capDisp" style="color:var(--gl)">100.00</span>€</div>
    <div id="ddDisp">DD: 0%</div>
</div>

<div class="mode-toggle">
    <div id="btnMan" class="mode-btn on" onclick="setMode('MANUEL')">MANUEL (M)</div>
    <div id="btnEA" class="mode-btn" onclick="setMode('EA Claude')">EA CLAUDE (A)</div>
</div>

<div class="stabs">
    <div class="stab" onclick="showStrat('LIQ')">LIQUIDITY</div>
    <div class="stab" onclick="showStrat('LDN')">LONDON</div>
    <div class="stab" onclick="showStrat('ICT')">ICT/FVG</div>
    <div class="stab" onclick="showStrat('EMA')">EMA</div>
    <div class="stab" onclick="viewJournal()" style="background:var(--gb); color:var(--gl)">📜 JOURNAL</div>
</div>

<div class="msgs" id="chat">
    <div class="msg ai"><b>Terminal Alpha V8.1 activé.</b><br>Mode actuel : <b id="modeLabel">MANUEL</b>.<br><br>Utilise <b>"Nettoyer"</b> pour vider le chat sans perdre tes données.</div>
</div>

<div class="qas">
    <div class="qa" onclick="handleTrade('achat')" style="border-color:var(--gr)">🟢 ACHAT</div>
    <div class="qa" onclick="handleTrade('vente')" style="border-color:var(--rd)">🔴 VENTE</div>
    <div class="qa" onclick="clearChat()">🧹 NETTOYER</div>
    <div class="qa" onclick="copyReport()">📋 COPIER RAPPORT</div>
</div>

<div class="in-area">
    <input type="text" id="userInput" placeholder="Note ou 'capital = 120'">
    <button class="sbtn" onclick="handleSend()">🚀</button>
</div>

<script>
let state = { 
    cap: parseFloat(localStorage.getItem('apex_v8_cap')) || 100.00, 
    price: 2025.40, // Base XAUUSD
    mode: 'MANUEL',
    journal: JSON.parse(localStorage.getItem('apex_v8_journal')) || []
};

// SIMULATION PRIX XAUUSD (Proche de Vantage)
function updatePrice() {
    let change = (Math.random() - 0.5) * 0.4;
    state.price += change;
    document.getElementById('price').innerHTML = `<div class="hsd"></div> XAU/USD $${state.price.toFixed(2)}`;
}
setInterval(updatePrice, 2000);

const STRATS = {
    LIQ: `<b>🎯 LIQUIDITY SWEEP</b><hr>Sweep de Liquidité M15 -> Entrée M1 après MSB.`,
    LDN: `<b>🇬🇧 LONDON SILVER BULLET</b><hr>Focus 09:00. Judas Swing probable à 09:10.`,
    ICT: `<b>💎 ICT FVG</b><hr>Cherche le Gap entre bougie 1 et 3 après impulsion.`,
    EMA: `<b>📈 EMA TREND</b><hr>EMA 21 > 50. Rebond sur la jaune.`
};

function setMode(m) {
    state.mode = m;
    document.getElementById('btnMan').className = m === 'MANUEL' ? 'mode-btn on' : 'mode-btn';
    document.getElementById('btnEA').className = m === 'EA Claude' ? 'mode-btn on' : 'mode-btn';
    document.getElementById('modeLabel').innerText = m;
    addMsg('ai', `Mode : <b>${m}</b>`);
}

function updateUI() {
    document.getElementById('capDisp').innerText = state.cap.toFixed(2);
    localStorage.setItem('apex_v8_cap', state.cap);
    let dd = ((100 - state.cap) / 100) * 100;
    document.getElementById('ddDisp').innerText = `DD: ${dd > 0 ? dd.toFixed(1) : 0}%`;
}

function handleTrade(type) {
    let lot = (state.cap * 0.05 / 15).toFixed(2);
    let tradeInfo = {
        date: new Date().toLocaleTimeString(),
        type: type.toUpperCase(),
        price: state.price.toFixed(2),
        lot: lot,
        mode: state.mode
    };
    state.journal.push(tradeInfo);
    saveJournal();
    addMsg('ai', `<b>Ordre ${type.toUpperCase()}</b> enregistré.<br>Prix: ${state.price.toFixed(2)} | Lot: ${lot}`);
}

function viewJournal() {
    if(state.journal.length === 0) {
        addMsg('ai', "Le journal est vide.");
        return;
    }
    let html = "<b>📜 HISTORIQUE RÉCENT</b><hr>";
    state.journal.slice(-10).reverse().forEach(j => {
        html += `<div style="font-size:11px; margin-bottom:5px; border-bottom:1px dashed #333">
        [${j.date}] <b>${j.type}</b> - ${j.price}$ (Lot: ${j.lot || 'N/A'}) ${j.note || ''}
        </div>`;
    });
    addMsg('ai', html);
}

function clearChat() {
    document.getElementById('chat').innerHTML = '<div class="msg ai"><b>Chat nettoyé.</b><br>Données de trading conservées.</div>';
}

function handleSend() {
    const inp = document.getElementById('userInput');
    let val = inp.value.trim();
    if(!val) return;
    addMsg('user', val);
    
    if(val.toLowerCase().includes('capital')) {
        let num = val.match(/[\d.]+/);
        if(num) {
            state.cap = parseFloat(num[0]);
            state.journal.push({date: new Date().toLocaleTimeString(), type: 'MAJ CAP', note: `Nouveau solde: ${state.cap}€`});
            saveJournal();
            addMsg('ai', `✅ Capital mis à jour : ${state.cap}€`);
        }
    } else {
        state.journal.push({date: new Date().toLocaleTimeString(), type: 'NOTE', note: val});
        saveJournal();
    }
    inp.value = ""; updateUI();
}

function saveJournal() {
    localStorage.setItem('apex_v8_journal', JSON.stringify(state.journal));
}

function copyReport() {
    let report = `RAPPORT GOLD APEX :\nSolde: ${state.cap}€\nMode: ${state.mode}\nJournal:\n` + JSON.stringify(state.journal.slice(-15));
    navigator.clipboard.writeText(report);
    alert("Rapport copié ! Colle-le dans notre chat.");
}

function showStrat(s) { addMsg('ai', STRATS[s]); }
function addMsg(role, content) {
    const chat = document.getElementById('chat');
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    div.innerHTML = content;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}
updateUI();
</script>
</body>
</html>
