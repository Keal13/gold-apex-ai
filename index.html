<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Gold Apex AI — Expert V6</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--gold:#C9A84C;--gl:#E8C460;--gd:rgba(201,168,76,0.12);--gb:rgba(201,168,76,0.22);--bg:#080808;--bg2:#0E0E0E;--bg3:#141414;--tx:#DDD5C8;--mu:#555;--gr:#4CAF82;--rd:#E05555}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
.hdr{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid #1A1A1A;background:var(--bg);flex-shrink:0}
.hlogo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;background:linear-gradient(135deg,var(--gl),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}
.hstatus{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:11px;color:var(--gr);font-family:'DM Mono',monospace}
.hsd{width:7px;height:7px;border-radius:50%;background:var(--gr);animation:pl 2s infinite}
@keyframes pl{0%,100%{opacity:1}50%{opacity:0.3}}
.cap-bar{background:var(--bg2);padding:10px 16px;border-bottom:1px solid #111;display:flex;justify-content:space-between;font-size:11px;font-family:'DM Mono',monospace}
.cap-val{color:var(--gl);font-weight:bold}
.stabs{display:flex;border-bottom:1px solid #111;flex-shrink:0;overflow-x:auto;scrollbar-width:none;background:var(--bg2)}
.stabs::-webkit-scrollbar{display:none}
.stab{flex-shrink:0;padding:12px 18px;font-size:10px;color:var(--mu);cursor:pointer;border-bottom:2px solid transparent;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:1px}
.stab.on{color:var(--gl);border-bottom-color:var(--gold);background:var(--gd)}
.msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:14px}
.msg{max-width:85%;padding:12px 15px;border-radius:14px;font-size:13.5px;line-height:1.6;animation:fi 0.3s ease}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.ai{background:var(--bg3);border-left:3px solid var(--gold);align-self:flex-start}
.user{background:var(--gd);border:0.5px solid var(--gb);color:var(--gl);align-self:flex-end;border-bottom-right-radius:2px}
.qas{display:flex;gap:8px;padding:10px;overflow-x:auto;scrollbar-width:none;border-top:1px solid #111}
.qa{flex-shrink:0;background:var(--bg3);border:0.5px solid #222;border-radius:20px;color:#888;font-size:11px;padding:6px 14px;cursor:pointer}
.in-area{padding:12px;background:var(--bg);display:flex;gap:10px;border-top:1px solid #111}
input{flex:1;background:var(--bg3);border:1px solid #222;color:white;padding:12px;border-radius:12px;outline:none;font-size:14px}
.sbtn{background:var(--gd);border:1px solid var(--gb);width:45px;border-radius:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--gl)}
#danger{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.98);z-index:999;flex-direction:column;align-items:center;justify-content:center;padding:30px;text-align:center}
</style>
</head>
<body>

<div id="danger">
    <div style="color:var(--rd);font-family:'Bebas Neue';font-size:32px;margin-bottom:15px">STOP TRADING</div>
    <div style="color:#aaa;margin-bottom:20px;">Drawdown -20% atteint. Protège tes fonds.</div>
    <button onclick="document.getElementById('danger').style.display='none';location.reload();" style="background:var(--rd);color:white;padding:10px 20px;border:none;border-radius:5px;">RÉINITIALISER</button>
</div>

<div class="hdr">
    <div><div class="hlogo">GOLD APEX AI</div></div>
    <div class="hstatus" id="price"><div class="hsd"></div> XAUUSD: $---</div>
</div>

<div class="cap-bar">
    <div>CAPITAL: <span id="capDisp" class="cap-val">100.00</span>€</div>
    <div id="ddDisp" style="color:var(--mu)">DD: 0%</div>
</div>

<div class="stabs">
    <div class="stab on" onclick="setStrat('liquidity')">Liquidity</div>
    <div class="stab" onclick="setStrat('london')">London</div>
    <div class="stab" onclick="setStrat('orderblock')">Order Block</div>
    <div class="stab" onclick="setStrat('ict')">ICT</div>
</div>

<div class="msgs" id="chat">
    <div class="msg ai">Prêt. Écris <b>"Achat"</b> ou <b>"Vente"</b> pour avoir tes niveaux précis de SL/TP immédiatement.</div>
</div>

<div class="qas">
    <div class="qa" onclick="handleTrade('achat')">🟢 Calcul ACHAT</div>
    <div class="qa" onclick="handleTrade('vente')">🔴 Calcul VENTE</div>
    <div class="qa" onclick="quick('psy')">🧠 Mental</div>
</div>

<div class="in-area">
    <input type="text" id="userInput" placeholder="Ex: Achat ou capital = 120">
    <button class="sbtn" onclick="handleSend()">🚀</button>
</div>

<script>
let state = { cap: parseFloat(localStorage.getItem('apex_v6_cap')) || 100.00, price: 0 };
const STRATS = {
    liquidity: "🎯 **LIQUIDITY SWEEP**<br>Cherche un rejet sur un haut/bas précédent.",
    london: "🇬🇧 **LONDON BREAKOUT**<br>Cassure du range de 08:00-09:00.",
    orderblock: "🧱 **ORDER BLOCKS**<br>Entrée sur le 50% de la bougie institutionnelle.",
    ict: "💎 **ICT / FVG**<br>Retour dans le Fair Value Gap après un sweep."
};

function updateUI() {
    document.getElementById('capDisp').innerText = state.cap.toFixed(2);
    localStorage.setItem('apex_v6_cap', state.cap);
    let dd = ((100 - state.cap) / 100) * 100;
    document.getElementById('ddDisp').innerText = `DD: ${dd > 0 ? dd.toFixed(1) : 0}%`;
    if(dd >= 20) document.getElementById('danger').style.display = 'flex';
}

async function getPrice() {
    try {
        const r = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=PAXGUSDT');
        const d = await r.json();
        state.price = parseFloat(d.price);
        document.getElementById('price').innerHTML = `<div class="hsd"></div> XAUUSD: $${state.price.toFixed(2)}`;
    } catch(e) {}
}
setInterval(getPrice, 5000); getPrice();

function setStrat(s) { addMsg('ai', STRATS[s]); }

function handleTrade(type) {
    if(!state.price || state.price === 0) { addMsg('ai', "Attente du prix direct..."); return; }
    let risk = state.cap * 0.05;
    let slPips = 20; // 20 pips = 2$ sur le Gold
    let tpPips = 40; // RR 1:2
    
    let lot = (risk / (slPips * 10 / 10)).toFixed(2); // Calcul lot standardisé
    if(lot < 0.01) lot = 0.01;

    let slPrice, tpPrice;
    if(type === 'achat') {
        slPrice = state.price - 2.00;
        tpPrice = state.price + 4.00;
        addMsg('ai', `🟢 **SIGNAL ACHAT (Long)**<br>• Lot (5%): **${lot}**<br><br>📍 **ENTRÉE : ${state.price.toFixed(2)}**<br>🚫 **STOP LOSS : ${slPrice.toFixed(2)}** (-20 pips)<br>🎯 **TAKE PROFIT : ${tpPrice.toFixed(2)}** (+40 pips)`);
    } else {
        slPrice = state.price + 2.00;
        tpPrice = state.price - 4.00;
        addMsg('ai', `🔴 **SIGNAL VENTE (Short)**<br>• Lot (5%): **${lot}**<br><br>📍 **ENTRÉE : ${state.price.toFixed(2)}**<br>🚫 **STOP LOSS : ${slPrice.toFixed(2)}** (+20 pips)<br>🎯 **TAKE PROFIT : ${tpPrice.toFixed(2)}** (+40 pips)`);
    }
}

function handleSend() {
    const inp = document.getElementById('userInput');
    let val = inp.value.trim().toLowerCase();
    if(!val) return;
    addMsg('user', val);
    
    if(val.includes('achat')) handleTrade('achat');
    else if(val.includes('vente')) handleTrade('vente');
    else if(val.includes('capital')) {
        let num = val.match(/[\d.]+/);
        if(num) {
            state.cap = parseFloat(num[0]);
            addMsg('ai', `✅ Capital mis à jour : **${state.cap.toFixed(2)}€**`);
        }
    } else process(val);
    
    inp.value = ""; updateUI();
}

function process(t) {
    if(t.includes('psy')) addMsg('ai', "🧠 Rappel J1 : La panique tue le compte. Respire, 5 trades max.");
    else addMsg('ai', "Tape 'Achat' ou 'Vente' pour tes niveaux.");
}

function addMsg(role, content) {
    const chat = document.getElementById('chat');
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    div.innerHTML = content;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

function quick(cmd) { process(cmd); }
updateUI();
</script>
</body>
</html>
