<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Gold Apex AI — Terminal V14</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--gold:#C9A84C;--gl:#E8C460;--gd:rgba(201,168,76,0.12);--gb:rgba(201,168,76,0.22);--bg:#080808;--bg2:#0E0E0E;--bg3:#141414;--tx:#DDD5C8;--mu:#555;--gr:#4CAF82;--rd:#E05555}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
.hdr{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid #1A1A1A;flex-shrink:0}
.hlogo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;background:linear-gradient(135deg,var(--gl),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hstatus{margin-left:auto;font-size:11px;color:var(--gr);font-family:'DM Mono',monospace;display:none;align-items:center;gap:5px}
.hstatus.active{display:flex}
.hsd{width:8px;height:8px;border-radius:50%;background:var(--gr);animation:pl 1s infinite}
@keyframes pl{0%,100%{opacity:1}50%{opacity:0.2}}
.cap-bar{background:var(--bg2);padding:10px 16px;border-bottom:1px solid #111;display:flex;justify-content:space-between;font-size:11px;font-family:'DM Mono',monospace}
.stabs{display:flex;border-bottom:1px solid #111;flex-shrink:0;background:var(--bg2)}
.stab{flex:1;padding:12px 5px;font-size:9px;color:var(--mu);cursor:pointer;border-bottom:2px solid transparent;font-family:'DM Mono',monospace;text-transform:uppercase;text-align:center}
.stab.on{color:var(--gl);border-bottom-color:var(--gold);background:var(--gd)}
.msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.msg{max-width:92%;padding:14px;border-radius:12px;font-size:13px;line-height:1.5;animation:fadeIn 0.3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.ai{background:var(--bg3);border-left:3px solid var(--gold);align-self:flex-start}
.user{background:var(--gd);color:var(--gl);align-self:flex-end}
.qas{display:flex;gap:8px;padding:10px;overflow-x:auto;border-top:1px solid #111;background:var(--bg2);min-height:55px}
.qa{flex-shrink:0;background:var(--bg3);border:1px solid #222;border-radius:20px;color:#888;font-size:10px;padding:8px 14px;cursor:pointer;white-space:nowrap}
.in-area{padding:12px;background:var(--bg);display:flex;gap:10px;border-top:1px solid #111}
input, select{background:var(--bg3);border:1px solid #333;color:white;padding:10px;border-radius:8px;outline:none;font-size:12px;width:100%}
.sbtn{background:var(--gd);border:1px solid var(--gold);width:45px;border-radius:12px;display:flex;align-items:center;justify-content:center;color:var(--gl);cursor:pointer}
hr{border:0;border-top:1px solid rgba(201,168,76,0.2);margin:8px 0}
b{color:var(--gl)}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);z-index:10000;align-items:center;justify-content:center;padding:20px}
.modal-content{background:var(--bg2);border:1px solid var(--gold);padding:20px;border-radius:15px;max-width:400px;width:100%}
#alertOverlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(224,85,85,0.95);color:white;z-index:9999;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px}
</style>
</head>
<body>

<div id="alertOverlay">
    <h1 style="font-family:'Bebas Neue'; font-size:40px;">⚠️ STOP TRADING ⚠️</h1>
    <p style="font-size:18px; margin-top:10px;">Perte journalière > 15%.<br>Reviens demain pour protéger ton capital.</p>
    <button onclick="document.getElementById('alertOverlay').style.display='none'" style="margin-top:20px; padding:10px 20px; background:white; border:none; border-radius:5px; font-weight:bold; color:red;">COMPRIS</button>
</div>

<div id="stratModal" class="modal">
    <div class="modal-content">
        <div id="stratTitle" style="font-family:'Bebas Neue'; font-size:22px; color:var(--gl); margin-bottom:10px;">STRATÉGIE</div>
        <div id="stratBody" style="font-size:13px; line-height:1.6;"></div>
        <button onclick="closeStrat()" style="width:100%; margin-top:15px; height:40px; background:var(--gold); border:none; border-radius:8px; font-weight:bold; cursor:pointer;">FERMER</button>
    </div>
</div>

<div class="hdr">
    <div class="hlogo">GOLD APEX PRO</div>
    <div class="hstatus" id="tradeIndicator"><div class="hsd"></div> TRADE EN COURS</div>
</div>

<div class="cap-bar">
    <div>SOLDE: <b id="capDisp">100.00</b>€</div>
    <div id="ddDisp">JOUR: 0%</div>
</div>

<div class="stabs">
    <div class="stab" onclick="popStrat('LIQ')">LIQUIDITY</div>
    <div class="stab" onclick="popStrat('LDN')">LONDON</div>
    <div class="stab" onclick="popStrat('ICT')">ICT/FVG</div>
    <div class="stab" onclick="viewJournal()" style="background:var(--gb); color:var(--gl)">📜 JOURNAL</div>
</div>

<div class="msgs" id="chat">
    <div class="msg ai"><b>Terminal V14 Connecté.</b><br>Précision Vantage 1:500. Tape ton capital (ex: 100) pour commencer.</div>
</div>

<div class="qas" id="actionButtons"></div>

<div class="in-area">
    <input type="text" id="userInput" placeholder="Note ou '100'">
    <button class="sbtn" onclick="handleSend()">🚀</button>
</div>

<script>
let state = { 
    cap: parseFloat(localStorage.getItem('apex_v14_cap')) || 100.00,
    startDayCap: parseFloat(localStorage.getItem('apex_v14_daystart')) || 100.00,
    journal: JSON.parse(localStorage.getItem('apex_v14_journal')) || [],
    activeTrade: null
};

const STRAT_DATA = {
    LIQ: { t: "🎯 LIQUIDITY SWEEP", b: "1. Repérer EQH/EQL.<br>2. Attendre le sweep (mèche).<br>3. Cassure de structure M1.<br>4. Entrée retest." },
    LDN: { t: "🇬🇧 LONDON SILVER BULLET", b: "Fenêtre 09h00-10h00.<br>Souvent une manipulation Judas Swing à 09h10.<br>Vise l'expansion." },
    ICT: { t: "💎 ICT / FVG", b: "Bougie impulsive + Gap.<br>Entrée à 50% du FVG.<br>SL derrière la bougie d'impulsion." }
};

function updateUI() {
    document.getElementById('capDisp').innerText = state.cap.toFixed(2) + "€";
    localStorage.setItem('apex_v14_cap', state.cap);
    localStorage.setItem('apex_v14_daystart', state.startDayCap);
    
    let lossPct = ((state.startDayCap - state.cap) / state.startDayCap) * 100;
    document.getElementById('ddDisp').innerText = `JOUR: ${lossPct > 0 ? lossPct.toFixed(1) : 0}%`;
    if(lossPct >= 15) document.getElementById('alertOverlay').style.display = 'flex';

    const actions = document.getElementById('actionButtons');
    const indicator = document.getElementById('tradeIndicator');
    
    if(state.activeTrade) {
        indicator.classList.add('active');
        actions.innerHTML = `<div class="qa" onclick="showCloseForm()" style="border-color:var(--rd); color:var(--rd); font-weight:bold;">❌ CLÔTURER LE TRADE</div>`;
    } else {
        indicator.classList.remove('active');
        actions.innerHTML = `
            <div class="qa" onclick="askEntry('achat')" style="border-color:var(--gr); color:var(--gr)">🟢 ACHAT</div>
            <div class="qa" onclick="askEntry('vente')" style="border-color:var(--rd); color:var(--rd)">🔴 VENTE</div>
            <div class="qa" onclick="clearChat()">🧹 NETTOYER</div>
            <div class="qa" onclick="copyReport()">📋 COPIER RAPPORT</div>
        `;
    }
}

function popStrat(s) {
    document.getElementById('stratTitle').innerText = STRAT_DATA[s].t;
    document.getElementById('stratBody').innerHTML = STRAT_DATA[s].b;
    document.getElementById('stratModal').style.display = 'flex';
}
function closeStrat() { document.getElementById('stratModal').style.display = 'none'; }

function askEntry(type) {
    addMsg('ai', `<b>Configuration ${type.toUpperCase()}</b>
        <div style="background:var(--bg3); padding:10px; border-radius:8px; margin-top:8px; border:1px solid #333">
            <input type="number" id="priceInp" step="0.1" placeholder="Prix Vantage" style="margin-bottom:8px;">
            <div style="display:flex; gap:5px; margin-bottom:8px;">
                <select id="riskInp"><option value="2">Risque 2%</option><option value="5" selected>Risque 5%</option><option value="10">Risque 10%</option></select>
                <select id="slInp"><option value="1">SL 1pt</option><option value="2.5" selected>SL 2.5pts</option><option value="5">SL 5pts</option></select>
            </div>
            <select id="stratInp" style="margin-bottom:8px;">
                <option value="Liquidity">Liquidity Sweep</option><option value="London">London Bullet</option><option value="ICT">ICT / FVG</option><option value="News">News / Scalping</option>
            </select>
            <button onclick="confirmTrade('${type}')" style="width:100%; padding:10px; background:var(--gold); color:black; font-weight:bold; border:none; border-radius:5px;">VALIDER</button>
        </div>`);
}

function confirmTrade(type) {
    const p = parseFloat(document.getElementById('priceInp').value);
    const strat = document.getElementById('stratInp').value;
    const risk = parseFloat(document.getElementById('riskInp').value);
    const slDist = parseFloat(document.getElementById('slInp').value);
    
    if(!p) return;

    let riskEuro = state.cap * (risk / 100);
    let lot = (riskEuro / slDist) / 10;
    lot = Math.max(0.01, parseFloat(lot.toFixed(2)));

    let slPrice = type === 'achat' ? p - slDist : p + slDist;
    let tpPrice = type === 'achat' ? p + (slDist * 2) : p - (slDist * 2);

    state.activeTrade = { type, entry: p, lot, sl: slPrice, tp: tpPrice, strat, time: new Date().toLocaleTimeString() };
    addMsg('ai', `🚀 <b>TRADE ACTIF</b><hr>Lot Vantage : <b style="font-size:18px;">${lot}</b><br>SL: ${slPrice.toFixed(2)} | TP: ${tpPrice.toFixed(2)}`);
    updateUI();
}

function showCloseForm() {
    addMsg('ai', `<b>Fermeture de position</b>
        <div style="background:var(--bg3); padding:10px; border-radius:8px; margin-top:8px; border:1px solid var(--rd)">
            <select id="resType" style="margin-bottom:8px;"><option value="TP">🎯 TAKE PROFIT</option><option value="SL">🛑 STOP LOSS</option><option value="MANUAL">✋ MANUEL</option></select>
            <input type="number" id="pnlInp" step="0.01" placeholder="Profit/Perte (€)" style="margin-bottom:8px;">
            <button onclick="confirmClose()" style="width:100%; padding:10px; border:1px solid var(--rd); color:var(--rd); background:none; font-weight:bold;">ARCHIVER</button>
        </div>`);
}

function confirmClose() {
    const pnl = parseFloat(document.getElementById('pnlInp').value) || 0;
    const res = document.getElementById('resType').value;
    state.journal.push({ ...state.activeTrade, result: res, pnl: pnl, closeTime: new Date().toLocaleTimeString() });
    state.cap += pnl;
    state.activeTrade = null;
    localStorage.setItem('apex_v14_journal', JSON.stringify(state.journal));
    addMsg('ai', `✅ <b>Clôturé.</b> Nouveau solde : ${state.cap.toFixed(2)}€`);
    updateUI();
}

function viewJournal() {
    if(state.journal.length === 0) return addMsg('ai', "Journal vide.");
    let html = "<b>📜 DERNIERS TRADES</b><hr>";
    state.journal.slice(-3).reverse().forEach(j => {
        html += `<div style="font-size:11px; margin-bottom:5px; border-bottom:1px solid #222; padding-bottom:3px;">
        [${j.time}] ${j.strat} : <b>${j.pnl > 0 ? '+' : ''}${j.pnl}€</b></div>`;
    });
    addMsg('ai', html);
}

function handleSend() {
    const inp = document.getElementById('userInput');
    let val = inp.value.trim();
    if(!val) return;
    if(!isNaN(val)) {
        state.cap = parseFloat(val); state.startDayCap = state.cap;
        addMsg('ai', `Capital réglé à <b>${state.cap}€</b>. Prêt !`);
    } else {
        addMsg('user', val);
    }
    inp.value = ""; updateUI();
}

function clearChat() { document.getElementById('chat').innerHTML = '<div class="msg ai"><b>Terminal nettoyé.</b></div>'; }

function addMsg(role, content) {
    const chat = document.getElementById('chat');
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    div.innerHTML = content;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

function copyReport() {
    navigator.clipboard.writeText(JSON.stringify(state.journal));
    alert("Copié !");
}

updateUI();
</script>
</body>
</html>
