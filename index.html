<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Gold Apex AI — Terminal Pro V8</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--gold:#C9A84C;--gl:#E8C460;--gd:rgba(201,168,76,0.12);--gb:rgba(201,168,76,0.22);--bg:#080808;--bg2:#0E0E0E;--bg3:#141414;--tx:#DDD5C8;--mu:#555;--gr:#4CAF82;--rd:#E05555}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
.hdr{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid #1A1A1A;flex-shrink:0}
.hlogo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;background:linear-gradient(135deg,var(--gl),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hstatus{margin-left:auto;font-size:11px;color:var(--gr);font-family:'DM Mono',monospace;display:flex;align-items:center;gap:5px}
.hsd{width:7px;height:7px;border-radius:50%;background:var(--gr);animation:pl 2s infinite}
@keyframes pl{0%,100%{opacity:1}50%{opacity:0.3}}
.cap-bar{background:var(--bg2);padding:10px 16px;border-bottom:1px solid #111;display:flex;justify-content:space-between;font-size:11px;font-family:'DM Mono',monospace}
.stabs{display:flex;border-bottom:1px solid #111;flex-shrink:0;overflow-x:auto;scrollbar-width:none;background:var(--bg2)}
.stabs::-webkit-scrollbar{display:none}
.stab{flex-shrink:0;padding:12px 18px;font-size:10px;color:var(--mu);cursor:pointer;border-bottom:2px solid transparent;font-family:'DM Mono',monospace;text-transform:uppercase}
.stab.on{color:var(--gl);border-bottom-color:var(--gold);background:var(--gd)}
.msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.msg{max-width:92%;padding:14px;border-radius:12px;font-size:13px;line-height:1.5}
.ai{background:var(--bg3);border-left:3px solid var(--gold);align-self:flex-start}
.user{background:var(--gd);color:var(--gl);align-self:flex-end}
.mode-toggle{display:flex;padding:10px 16px;gap:10px;background:var(--bg2);border-bottom:1px solid #111}
.mode-btn{flex:1;padding:8px;font-size:10px;border-radius:6px;border:1px solid #222;background:var(--bg3);color:var(--mu);cursor:pointer;text-align:center;font-family:'DM Mono'}
.mode-btn.on{border-color:var(--gold);color:var(--gl);background:var(--gd)}
.qas{display:flex;gap:8px;padding:10px;overflow-x:auto;border-top:1px solid #111}
.qa{flex-shrink:0;background:var(--bg3);border:1px solid #222;border-radius:20px;color:#888;font-size:10px;padding:6px 14px;cursor:pointer}
.in-area{padding:12px;background:var(--bg);display:flex;gap:10px;border-top:1px solid #111}
input{flex:1;background:var(--bg3);border:1px solid #222;color:white;padding:12px;border-radius:12px;outline:none}
.sbtn{background:var(--gd);border:1px solid var(--gb);width:45px;border-radius:12px;display:flex;align-items:center;justify-content:center;color:var(--gl)}
hr{border:0;border-top:1px solid rgba(201,168,76,0.2);margin:8px 0}
b{color:var(--gl)}
</style>
</head>
<body>

<div class="hdr">
    <div class="hlogo">GOLD APEX PRO</div>
    <div class="hstatus" id="price"><div class="hsd"></div> $---</div>
</div>

<div class="cap-bar">
    <div>SOLDE: <span id="capDisp" style="color:var(--gl)">100.00</span>€</div>
    <div id="ddDisp">DD: 0%</div>
</div>

<div class="mode-toggle">
    <div id="btnMan" class="mode-btn on" onclick="setMode('MANUEL')">MANUEL (M)</div>
    <div id="btnEA" class="mode-btn" onclick="setMode('EA Claude')">EA CLAUDE (A)</div>
</div>

<div class="stabs">
    <div class="stab" onclick="showStrat('LIQ')">LIQUIDITY</div>
    <div class="stab" onclick="showStrat('LDN')">LONDON</div>
    <div class="stab" onclick="showStrat('ICT')">ICT/FVG</div>
    <div class="stab" onclick="showStrat('EMA')">EMA</div>
</div>

<div class="msgs" id="chat">
    <div class="msg ai"><b>Terminal Alpha activé.</b><br>Mode actuel : <b id="modeLabel">MANUEL</b>.<br><br>Utilise les boutons ou tape <b>"Rapport"</b> pour ton journal du soir.</div>
</div>

<div class="qas">
    <div class="qa" onclick="handleTrade('achat')">🟢 ACHAT</div>
    <div class="qa" onclick="handleTrade('vente')">🔴 VENTE</div>
    <div class="qa" onclick="copyReport()">📋 COPIER RAPPORT</div>
</div>

<div class="in-area">
    <input type="text" id="userInput" placeholder="Ex: capital = 120 ou Commentaire trade">
    <button class="sbtn" onclick="handleSend()">🚀</button>
</div>

<script>
let state = { 
    cap: parseFloat(localStorage.getItem('apex_v8_cap')) || 100.00, 
    price: 0, 
    mode: 'MANUEL',
    journal: JSON.parse(localStorage.getItem('apex_v8_journal')) || []
};

const STRATS = {
    LIQ: `<b>🎯 LIQUIDITY SWEEP (AVANCÉ)</b><hr>
    <b>• Contexte :</b> Repère les "Equal Highs" (doubles sommets) sur M15.<br>
    <b>• Psychologie :</b> Les particuliers placent leurs stops juste au-dessus. Le marché VA les chercher.<br>
    <b>• Le Setup :</b> Le prix perce le niveau, vide la liquidité, et clôture en "Pin Bar" (mèche de 70% de la bougie).<br>
    <b>• Validation :</b> Attendre la cassure de la structure M1 (BOS) après le sweep.<br>
    <b>• Sortie :</b> TP sur la liquidité opposée.`,
    
    LDN: `<b>🇬🇧 LONDON SILVER BULLET</b><hr>
    <b>• Horaire :</b> Focus strict 09h00 - 10h00 (Paris).<br>
    <b>• Règle du Range :</b> Si le prix sort du range Asie violemment, attends un "Retest" du bord du rectangle.<br>
    <b>• Manipulation :</b> Souvent, Londres fait un faux mouvement à 09h10 (Judas Swing) avant de partir dans la vraie direction.<br>
    <b>• Entrée :</b> Sur rejet du haut/bas de 08h50.`,

    ICT: `<b>💎 ICT FVG & MSB</b><hr>
    <b>• Étape 1 :</b> Déplacement (bougie impulsive longue).<br>
    <b>• Étape 2 :</b> FVG (Fair Value Gap) créé entre bougie 1 et 3.<br>
    <b>• Étape 3 :</b> Market Structure Break (MSB). On change de tendance sur M1.<br>
    <b>• Entrée :</b> Ordre limite à l'entrée du FVG.<br>
    <b>• SL :</b> Juste derrière la bougie impulsive.`,

    EMA: `<b>📈 EMA TREND RIDER</b><hr>
    <b>• Config :</b> EMA 21 (Jaune) / EMA 50 (Blanche).<br>
    <b>• Filtre :</b> On ne cherche que des achats si 21 > 50.<br>
    <b>• Signal :</b> Le prix doit "rebondir" sur l'EMA 21 après un retracement propre.<br>
    <b>• Confluence :</b> Bougie englobante sur l'EMA.`
};

function setMode(m) {
    state.mode = m;
    document.getElementById('btnMan').className = m === 'MANUEL' ? 'mode-btn on' : 'mode-btn';
    document.getElementById('btnEA').className = m === 'EA Claude' ? 'mode-btn on' : 'mode-btn';
    document.getElementById('modeLabel').innerText = m;
    addMsg('ai', `Passage en mode : <b>${m}</b>`);
}

function updateUI() {
    document.getElementById('capDisp').innerText = state.cap.toFixed(2);
    localStorage.setItem('apex_v8_cap', state.cap);
    let dd = ((100 - state.cap) / 100) * 100;
    document.getElementById('ddDisp').innerText = `DD: ${dd > 0 ? dd.toFixed(1) : 0}%`;
}

async function getPrice() {
    try {
        const r = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=PAXGUSDT');
        const d = await r.json();
        state.price = parseFloat(d.price);
        document.getElementById('price').innerHTML = `<div class="hsd"></div> $${state.price.toFixed(2)}`;
    } catch(e) {}
}
setInterval(getPrice, 5000); getPrice();

function handleTrade(type) {
    let risk = state.cap * 0.05;
    let lot = (risk / 15).toFixed(2);
    let sl = type === 'achat' ? state.price - 2 : state.price + 2;
    let tp = type === 'achat' ? state.price + 4 : state.price - 4;
    
    let tradeInfo = {
        date: new Date().toLocaleTimeString(),
        type: type,
        mode: state.mode,
        price: state.price,
        lot: lot
    };
    state.journal.push(tradeInfo);
    localStorage.setItem('apex_v8_journal', JSON.stringify(state.journal));

    addMsg('ai', `<b>Ordre ${type.toUpperCase()} (${state.mode})</b><hr>Lot: <b>${lot}</b><br>SL: ${sl.toFixed(2)} | TP: ${tp.toFixed(2)}<br><i>Enregistré dans le journal.</i>`);
}

function handleSend() {
    const inp = document.getElementById('userInput');
    let val = inp.value.trim();
    if(!val) return;
    addMsg('user', val);
    
    if(val.toLowerCase().includes('capital')) {
        let num = val.match(/[\d.]+/);
        if(num) {
            let old = state.cap;
            state.cap = parseFloat(num[0]);
            let res = state.cap - old;
            state.journal.push({date: new Date().toLocaleTimeString(), type: 'UPDATE', note: `Solde: ${state.cap}€ (Var: ${res.toFixed(2)}€)`});
            addMsg('ai', `✅ Solde mis à jour. Variation : ${res.toFixed(2)}€`);
        }
    } else if(val.toLowerCase().includes('rapport')) {
        generateReport();
    } else {
        state.journal.push({date: new Date().toLocaleTimeString(), type: 'NOTE', note: val});
        addMsg('ai', "Note ajoutée au journal.");
    }
    inp.value = ""; updateUI();
}

function generateReport() {
    let report = `📊 **RAPPORT SESSION GOLD APEX**\n`;
    report += `💰 Solde Final: ${state.cap.toFixed(2)}€\n`;
    report += `⚙️ Mode de trading: ${state.mode}\n\n`;
    report += `📝 **JOURNAL :**\n`;
    state.journal.slice(-10).forEach(j => {
        report += `- [${j.date}] ${j.type} ${j.note || j.lot || ''}\n`;
    });
    addMsg('ai', `<div style="white-space:pre-wrap; font-family:monospace; font-size:11px;">${report}</div><br><b>Clique sur "COPIER RAPPORT" en bas pour me l'envoyer.</b>`);
}

function copyReport() {
    let report = `RAPPORT TRADING :\nSolde: ${state.cap}€\nMode: ${state.mode}\nTrades:\n` + JSON.stringify(state.journal.slice(-10));
    navigator.clipboard.writeText(report);
    alert("Rapport copié ! Colle-le maintenant dans notre conversation Claude.");
}

function showStrat(s) { addMsg('ai', STRATS[s]); }
function addMsg(role, content) {
    const chat = document.getElementById('chat');
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    div.innerHTML = content;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}
updateUI();
</script>
</body>
</html>
